name: Small request
description: Suggest a small documentation, example, or current-subset improvement.
title: "[request] "
labels: ["request"]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What change would help?
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: Fit with current status
      description: How does this fit the current public Silt subset?
    validations:
      required: false
