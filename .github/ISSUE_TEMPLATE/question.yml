name: Question
description: Ask about Silt's current behavior, examples, or public claim boundary.
title: "[question] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to understand?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link to the command, example, Book section, or status text that prompted the question.
    validations:
      required: false
